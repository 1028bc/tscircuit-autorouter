499999999984" x="430.8574351552765" y="387.0291338582677" width="14.560000000000002" height="27.999999999999943" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="6.399776523114326" data-y="-3.6752499999999992" x="453.8174351552765" y="387.0291338582677" width="14.560000000000002" height="28" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="10.123926523114328" data-y="-5.62775" x="535.9246792497647" y="430.07637795275593" width="14.559999999999945" height="28" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="9.082526523114327" data-y="-5.62775" x="512.9646792497647" y="430.07637795275593" width="14.559999999999945" height="28" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="8.041126523114327" data-y="-5.627749999999999" x="490.0046792497647" y="430.0763779527559" width="14.560000000000002" height="28" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="9.877287499999998" data-y="-7.73775" x="528.9480708661417" y="480.1236220472441" width="17.63779527559052" height="20.944881889763792" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="8.2272875" data-y="-7.73775" x="492.5701181102362" y="480.1236220472441" width="17.637795275590577" height="20.944881889763792" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="8.2272875" data-y="-8.68775" x="492.5701181102362" y="501.0685039370079" width="17.637795275590577" height="20.94488188976368" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g><rect data-type="rect" data-label="" data-x="9.877287499999998" data-y="-8.68775" x="528.9480708661417" y="501.0685039370079" width="17.63779527559052" height="20.94488188976368" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04535714285714286"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":22.04724409448819,"c":0,"e":320,"b":0,"d":-22.04724409448819,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>